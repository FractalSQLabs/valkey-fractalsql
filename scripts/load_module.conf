# scripts/load_module.conf
#
# Valkey config snippet to load the FractalSQL module at server
# startup. Append the loadmodule line below to your server config
# file (or `include` this file from it), then restart.
#
# Linux (Valkey):
#     sudo cp scripts/load_module.conf /etc/valkey/modules-available/fractalsql.conf
#     # then add to /etc/valkey/valkey.conf:
#     #     include /etc/valkey/modules-available/fractalsql.conf
#     # or append the loadmodule line directly.
#     sudo systemctl restart valkey-server   # Debian / Ubuntu
#     sudo systemctl restart valkey          # RHEL / Fedora
#
# Runtime alternative (does NOT persist across restarts):
#
#     valkey-cli MODULE LOAD /usr/lib/valkey/modules/fractalsql.so
#
# Sanity check after load:
#
#     valkey-cli MODULE LIST
#     valkey-cli FRACTALSQL.EDITION         # -> "Community"
#     valkey-cli FRACTALSQL.VERSION         # -> "1.0.0"
#     valkey-cli COMMAND INFO FRACTAL.SEARCH

loadmodule /usr/lib/valkey/modules/fractalsql.so
